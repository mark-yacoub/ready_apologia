<div class="verse-row active-verse" data-astro-cid-ccxl2z63="" data-topic-notes='{"divinity_of_the_holy_spirit":"The Spirit of God is shown actively hovering over the unformed waters at the very beginning of creation. Activity in creation is a clear proof of divinity, because creatures cannot create. Since the Spirit participates in the foundational act of bringing the cosmos into existence alongside the Father, He cannot be part of the created order, demonstrating His uncreated, divine nature.","trinity":"The Spirit of God is described as actively hovering over the waters, introducing the Spirit as a distinct agent involved in the act of creation alongside God."}' data-topics="divinity_of_the_holy_spirit,trinity" id="2"> <div class="verse-row-content" data-astro-cid-ccxl2z63=""> <span class="verse-num" data-astro-cid-ccxl2z63="">2</span> <div class="verse-body-wrapper" data-astro-cid-ccxl2z63=""> <p class="verse-text" data-astro-cid-ccxl2z63=""> <a class="verse-text-link-wrapper" data-astro-cid-ccxl2z63="" href="/ready_apologia/bible/gn/1/2"> But the earth was unsightly and unfurnished, and darkness was over the deep, and the Spirit of God moved over the water. </a> <span class="verse-badge-tray-inline" data-astro-cid-ccxl2z63=""> <a class="icon-inline ms-icon" data-astro-cid-ccxl2z63="" href="/ready_apologia/bible/gn/1/2/manuscripts" title="Manuscripts available"> <svg data-astro-cid-ccxl2z63="" stroke-width="2.5" viewbox="0 0 24 24"> <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" data-astro-cid-ccxl2z63="" stroke-linecap="round" stroke-linejoin="round"></path> </svg> </a> <a class="icon-inline ct-icon" data-astro-cid-ccxl2z63="" href="/ready_apologia/bible/gn/1/2/contradictions" title="Alleged contradictions available"> <svg data-astro-cid-ccxl2z63="" stroke-width="2.5" viewbox="0 0 24 24"> <path d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7h3.5m5.5 0H18m0 0l-3 9a5.002 5.00
